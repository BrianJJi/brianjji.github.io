<!DOCTYPE html>
<html>
<head>
  <title>Brian Ji</title>
  <style>
    body {
      background-color: #efe6e1;
      font-family: Garamond, serif;
      display: flex;
      justify-content: center; /* Center align the content horizontally */
    }
    .index-column {
      width: 20%; /* Adjust the width as desired */
      background-color: transparent; /* Transparent background */
      padding: 20px; /* Adjust the padding as desired */
      margin-top: 130px;
      margin-left: 50px;
      margin-right: 50px;
      line-height: 2;
      visibility: hidden; /* Initially hide the column */
    }
    .index-column.loaded {
      visibility: visible; /* Show the column when the image is loaded */
    }


    .main-content {
      padding: 20px; /* Adjust the padding as desired */
      margin-top: 20px; /* Adjust the margin-top to align with index column */
      opacity: 0; /* Initially hide the content */
      transition: opacity 0.5s ease; /* Add a smooth transition effect */
    }
    .main-content.loaded {
      opacity: 1; /* Show the content when the image is loaded */
    }
  .hover-link {
    font-size: 36px;
    color: grey;
    text-decoration: none;
  }

  .hover-link:hover {
    text-decoration: underline;
  }
    .flexible-image {
      max-width: 100%;
      height: auto;
      display: block; /* Add display: block to remove any extra space below the image */
      margin: 0 auto; /* Center align the image horizontally */
    }

    .image-container {
  position: relative;
  width: 75%;
  height: auto;
  max-width: 100%;

}
.image-container {
  position: relative;
}
    .image-container .fixed-image {
      position: absolute;
      top: 100px;
      left: 100px;
      z-index: 2;
      width: 100%; /* Adjusted width to match container size */
      height: auto; /* Allow height to adjust based on content */
    }
    .image-container .moving-image {
      position: absolute;
      top: 0; /* Adjust the top value to move the image vertically */
      left: 0; /* Adjust the left value to move the image horizontally */
      z-index: 1;
      width: 100%; /* Adjusted width to match container size */
      height: auto; /* Allow height to adjust based on content */
    }

  </style>
    <script>
    function handleImageLoad() {
      var mainContent = document.querySelector('.main-content');
      mainContent.classList.add('loaded');

      var indexColumn = document.querySelector('.index-column');
      indexColumn.classList.add('loaded'); /* Add the "loaded" class to show the column */
    }
  </script>
</head>

<body>

  <div class="main-content">
    <h1 style="font-size: 48px;">Brian Ji</h1>
    <p style="font-size: 36px;">Investor, disciple, designer.
      <br>
      In pursuit of timeless truth.</p>
    <img src="testing.webp" alt="Vibe" class="flexible-image" onload="handleImageLoad()">
  </div>

    <div class="index-column loaded">
      <a href="https://twitter.com/BrianJJi" class="hover-link">Twitter</a>
      <br>
      <a href="https://read.cv/brianji" class="hover-link">About</a>
    </div>

    <!--
    <div class="image-container">
      <img src="testing.png" alt="Image 1" class="fixed-image">
      <img src="testing2.jpg" alt="Image 2" class="moving-image">
    </div>
  -->

</body>
</html>
